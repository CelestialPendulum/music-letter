<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pixel Garden Radio</title>
    <style>
        body {
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(#ffd89b, #f6b46c);
            font-family: 'Courier New', Courier, monospace;
            image-rendering: pixelated;
            overflow: hidden;
            transition: background 2s ease;
        }

        #effects-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1;
        }

        .garden {
            background: #fff3d6;
            border: 6px solid #8f6a3c;
            padding: 30px;
            text-align: center;
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
            z-index: 10;
            position: relative;
        }

        /* The Planted Flowers */
        .flower-bed {
            position: absolute;
            bottom: 0;
            width: 100%;
            height: 150px;
            display: flex;
            justify-content: space-around;
            align-items: flex-end;
            z-index: 5;
            padding-bottom: 20px;
        }

        .flower {
            font-size: 50px;
            transform: scale(0);
            transition: transform 1s cubic-bezier(0.18, 0.89, 0.32, 1.28);
            filter: drop-shadow(2px 2px 0px #3a2a1a);
        }

        .flower.bloom {
            transform: scale(1);
            animation: sway 4s infinite alternate ease-in-out;
        }

        @keyframes sway {
            from { transform: rotate(-5deg) scale(1); }
            to { transform: rotate(5deg) scale(1.1); }
        }

        /* Weather and Sun Effects */
        .drop { position: absolute; width: 2px; height: 10px; background: rgba(174, 194, 224, 0.8); animation: fall linear infinite; }
        @keyframes fall { to { transform: translateY(100vh); } }

        .sun {
            position: absolute;
            width: 140px;
            height: 140px;
            background: radial-gradient(circle, #fff9c4, #fbc02d);
            border-radius: 50%;
            bottom: -180px;
            left: 50%;
            transform: translateX(-50%);
            box-shadow: 0 0 80px #fbc02d;
            transition: bottom 4s ease-out;
            z-index: 2;
        }

        .heart { position: absolute; color: #ff85a1; font-size: 24px; animation: floatUp 4s linear forwards; }
        @keyframes floatUp { 0% { transform: translateY(100vh) scale(0.5); opacity: 1; } 100% { transform: translateY(-10vh) scale(1.5); opacity: 0; } }

        /* Interface Styling */
        input { padding: 12px; border: 3px solid #8f6a3c; background: #fff; font-size: 16px; outline: none; margin-bottom: 10px; }
        button { padding: 10px 20px; background: #7cc576; border: none; color: white; cursor: pointer; font-size: 16px; font-weight: bold; box-shadow: 0 4px #5da95a; }
        button:active { transform: translateY(4px); box-shadow: 0 0px #5da95a; }
    </style>
</head>
<body>

    <div id="effects-container"></div>
    <div id="sun" class="sun"></div>

    <div class="garden">
        <h1>Pixel Garden Radio</h1>
        <p class="note">A flower for every mood 🌿</p>
        
        <input type="text" id="mood" placeholder="love, sunrise, rain">
        <button onclick="playMusic()">Plant & Play 🎵</button>
        
        <br><br>
        <audio id="player" controls></audio>
    </div>

    <!-- The actual planted flowers -->
    <div class="flower-bed" id="flower-bed">
        <div class="flower" id="f1"></div>
        <div class="flower" id="f2"></div>
        <div class="flower" id="f3"></div>
        <div class="flower" id="f4"></div>
        <div class="flower" id="f5"></div>
    </div>

    <script>
        let heartInterval = null;

        function playMusic() {
            const moodInput = document.getElementById("mood");
            const player = document.getElementById("player");
            const mood = moodInput.value.toLowerCase().trim();
            const container = document.getElementById("effects-container");
            const sun = document.getElementById("sun");
            const flowers = document.querySelectorAll(".flower");

            // Reset Everything
            container.innerHTML = "";
            sun.style.bottom = "-180px";
            if (heartInterval) clearInterval(heartInterval);
            document.body.style.background = "linear-gradient(#ffd89b, #f6b46c)";
            flowers.forEach(f => f.classList.remove("bloom"));

            const songs = {
                love: "music/germany.mp3",
                sunrise: "music/summertown.mp3",
                rain: "music/stay.mp3"
            };

            if (songs[mood]) {
                player.src = songs[mood];
                player.load();
                player.play();

                if (mood === "rain") {
                    document.body.style.background = "linear-gradient(#4b6cb7, #182848)";
                    // Plant Lilacs and Lilies for rain
                    setFlowers(["🪻", "🪷", "🪻", "🪷", "🪻"]);
                    for(let i=0; i<80; i++) {
                        let drop = document.createElement("div");
                        drop.className = "drop";
                        drop.style.left = Math.random() * 100 + "vw";
                        drop.style.animationDuration = Math.random() * 0.5 + 0.5 + "s";
                        container.appendChild(drop);
                    }
                } 
                else if (mood === "sunrise") {
                    document.body.style.background = "linear-gradient(#a1887f, #f06292, #fdd835)";
                    sun.style.bottom = "25%";
                    // Plant Sunflowers and Gerbera for sunrise
                    setFlowers(["🌻", "🌼", "🌻", "🌼", "🌻"]);
                }
                else if (mood === "love") {
                    document.body.style.background = "linear-gradient(#ff9a9e, #fecfef)";
                    // Plant Roses and Tulips for love
                    setFlowers(["🌹", "🌷", "🌹", "🌷", "🌹"]);
                    heartInterval = setInterval(() => {
                        let heart = document.createElement("div");
                        heart.className = "heart";
                        heart.innerHTML = Math.random() > 0.5 ? "❤️" : "✨";
                        heart.style.left = Math.random() * 100 + "vw";
                        heart.style.animationDuration = Math.random() * 2 + 3 + "s";
                        container.appendChild(heart);
                        setTimeout(() => heart.remove(), 4000);
                    }, 450);
                }
            } else {
                alert("Try typing: love, sunrise, or rain 🌻");
            }
        }

        function setFlowers(emojiList) {
            const flowers = document.querySelectorAll(".flower");
            flowers.forEach((f, i) => {
                f.innerHTML = emojiList[i];
                setTimeout(() => f.classList.add("bloom"), i * 200);
            });
        }
    </script>
</body>
</html>
