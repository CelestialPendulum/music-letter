<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Garden of Ridleys 🌸</title>
    <style>
        body {
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(#ffd89b, #f6b46c);
            font-family: 'Georgia', serif; /* More artistic font */
            overflow: hidden;
            transition: background 2s ease;
        }

        #effects-container { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 1; }
        
        .sun { 
            position: absolute; width: 180px; height: 180px; background: #fff176; 
            border-radius: 50%; bottom: -200px; left: 50%; transform: translateX(-50%); 
            box-shadow: 0 0 100px #fbc02d; transition: bottom 4s ease-in-out; z-index: 2; 
        }

        .garden-box {
            background: rgba(255, 243, 214, 0.9);
            border: 4px solid #8f6a3c;
            padding: 30px;
            text-align: center;
            box-shadow: 0 15px 30px rgba(0,0,0,0.1);
            z-index: 100;
            position: relative;
            border-radius: 2px;
        }

        /* --- THE PAINTED MEADOW --- */
        .meadow {
            position: absolute;
            bottom: 0;
            width: 100%;
            height: 35vh;
            z-index: 10;
            /* Creates the "painted" ground effect */
            background: linear-gradient(to top, #4b6329, #8d9c3e, transparent);
            filter: blur(8px); /* Softens the ground like brushstrokes */
        }

        .flower-container {
            position: absolute;
            bottom: 20px;
            width: 100%;
            height: 300px;
            display: flex;
            justify-content: space-around;
            align-items: flex-end;
            padding: 0 20px;
            box-sizing: border-box;
            z-index: 15;
        }

        .flower {
            font-size: 80px;
            display: inline-block;
            transform: scale(0);
            transition: transform 2s cubic-bezier(0.1, 0.5, 0.1, 1);
            /* THE PAINT EFFECT: Blurs slightly then adds contrast to look like paint clumps */
            filter: blur(1px) contrast(1.5) drop-shadow(5px 5px 2px rgba(0,0,0,0.2));
        }

        .flower.bloom { transform: scale(1) translateY(0); animation: sway 8s infinite alternate ease-in-out; }

        /* Randomizes height slightly for a wild look */
        .flower:nth-child(even) { margin-bottom: 20px; font-size: 95px; }
        .flower:nth-child(3n) { margin-bottom: -10px; font-size: 70px; }

        @keyframes sway { 
            from { transform: rotate(-3deg) translateX(-5px); } 
            to { transform: rotate(3deg) translateX(5px); } 
        }

        /* Weather */
        .drop { position: absolute; width: 2px; height: 15px; background: #aebce0; animation: fall 1s linear infinite; opacity: 0.6; }
        @keyframes fall { to { transform: translateY(100vh); } }
        .heart { position: absolute; font-size: 25px; animation: float 5s linear forwards; filter: blur(1px); }
        @keyframes float { 0% { transform: translateY(100vh); opacity: 0.8; } 100% { transform: translateY(-10vh); opacity: 0; } }

        /* UI */
        h1 { color: #5d4037; font-style: italic; margin-top: 0; }
        input { padding: 12px; border: 2px solid #8f6a3c; font-size: 16px; background: transparent; width: 180px; outline: none; }
        button { padding: 12px 30px; background: #5d4037; border: none; color: white; cursor: pointer; font-size: 16px; margin-top: 10px; transition: 0.3s; }
        button:hover { background: #8f6a3c; }
    </style>
</head>
<body>

    <div id="effects-container"></div>
    <div id="sun" class="sun"></div>

    <div class="garden-box">
        <h1>Garden of Ridleys 🌸</h1>
        <p style="color: #8d6e63;">Type: love, sunrise, or rain</p>
        <input type="text" id="mood" placeholder="..."><br>
        <button onclick="playMusic()">Play</button>
        <br><br>
        <audio id="player" controls></audio>
    </div>

    <!-- Background Meadow -->
    <div class="meadow"></div>

    <!-- Flowers Layer -->
    <div class="flower-container">
        <div class="flower"></div>
        <div class="flower"></div>
        <div class="flower"></div>
        <div class="flower"></div>
        <div class="flower"></div>
        <div class="flower"></div>
        <div class="flower"></div>
    </div>

    <script>
        let heartInterval = null;

        function playMusic() {
            const mood = document.getElementById("mood").value.toLowerCase().trim();
            const player = document.getElementById("player");
            const container = document.getElementById("effects-container");
            const sun = document.getElementById("sun");
            const flowers = document.querySelectorAll(".flower");

            container.innerHTML = "";
            sun.style.bottom = "-200px";
            if (heartInterval) clearInterval(heartInterval);
            document.body.style.background = "linear-gradient(#ffd89b, #f6b46c)";
            flowers.forEach(f => f.classList.remove("bloom"));

            const songs = {
                love: "music/germany.mp3",
                sunrise: "music/summertown.mp3",
                rain: "music/stay.mp3"
            };

            if (songs[mood]) {
                player.src = songs[mood];
                player.play();

                if (mood === "rain") {
                    document.body.style.background = "linear-gradient(#37474f, #1a237e)";
                    setFlowers(["🪻", "🪷", "🪻", "🪷", "🪻", "🪷", "🪻"]);
                    for(let i=0; i<60; i++) {
                        let d = document.createElement("div"); d.className = "drop";
                        d.style.left = Math.random() * 100 + "vw"; d.style.animationDelay = Math.random() + "s";
                        container.appendChild(d);
                    }
                } 
                else if (mood === "sunrise") {
                    document.body.style.background = "linear-gradient(#ffab91, #ffd54f, #fff176)";
                    sun.style.bottom = "10%";
                    // These match the white/yellow flowers in your painting
                    setFlowers(["🌼", "💮", "🌼", "💮", "🌼", "💮", "🌼"]);
                }
                else if (mood === "love") {
                    document.body.style.background = "linear-gradient(#f48fb1, #fce4ec)";
                    setFlowers(["🌹", "🌸", "🌹", "🌸", "🌹", "🌸", "🌹"]);
                    heartInterval = setInterval(() => {
                        let h = document.createElement("div"); h.className = "heart";
                        h.innerHTML = "🌸"; h.style.left = Math.random() * 100 + "vw";
                        container.appendChild(h); setTimeout(() => h.remove(), 5000);
                    }, 600);
                }
            } else {
                alert("Enter: love, sunrise, or rain!");
            }
        }

        function setFlowers(list) {
            const flowers = document.querySelectorAll(".flower");
            flowers.forEach((f, i) => {
                f.innerHTML = list[i];
                setTimeout(() => f.classList.add("bloom"), i * 250);
            });
        }
    </script>
</body>
</html>
