<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pixel Garden Radio</title>
    <style>
        body {
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(#ffd89b, #f6b46c);
            font-family: 'Courier New', Courier, monospace;
            image-rendering: pixelated;
            overflow: hidden;
            transition: background 2s ease;
        }

        /* Weather/Sun Layer */
        #effects-container { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 1; }
        .sun { position: absolute; width: 150px; height: 150px; background: #fbc02d; border-radius: 50%; bottom: -180px; left: 50%; transform: translateX(-50%); box-shadow: 0 0 60px #fbc02d; transition: bottom 4s ease-out; z-index: 2; border: 4px solid #fff9c4; }

        /* The Radio Box */
        .garden {
            background: #fff3d6;
            border: 6px solid #8f6a3c;
            padding: 30px;
            text-align: center;
            box-shadow: 0 10px 0px #8f6a3c;
            z-index: 100;
            position: relative;
        }

        /* --- THE PIXEL MEADOW --- */
        .meadow {
            position: absolute;
            bottom: 0;
            width: 100%;
            height: 120px;
            display: flex;
            align-items: flex-end;
            z-index: 10;
            /* Grass Background */
            background: linear-gradient(transparent, #4caf50 20%);
        }

        /* Dense Grass Layer */
        .grass-blade {
            flex: 1;
            height: 40px;
            background: #2e7d32;
            margin: 0 -1px; /* Overlap to remove spaces */
            clip-path: polygon(50% 0%, 0% 100%, 100% 100%);
            animation: wind 3s infinite alternate ease-in-out;
        }

        /* The Flowers */
        .flower-container {
            position: absolute;
            bottom: 30px;
            width: 100%;
            display: flex;
            justify-content: center;
            gap: 0px; /* No space between flowers */
        }

        .flower {
            font-size: 60px;
            display: inline-block;
            transform: scale(0);
            transition: transform 1.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            filter: contrast(1.2) saturate(1.5);
            image-rendering: pixelated;
        }

        .flower.bloom { transform: scale(1); animation: sway 5s infinite alternate ease-in-out; }

        @keyframes wind { from { transform: skewX(-5deg); } to { transform: skewX(5deg); } }
        @keyframes sway { from { transform: rotate(-8deg); } to { transform: rotate(8deg); } }

        /* Effects */
        .drop { position: absolute; width: 3px; height: 12px; background: #90caf9; animation: fall 0.8s linear infinite; }
        @keyframes fall { to { transform: translateY(100vh); } }
        .heart { position: absolute; font-size: 20px; animation: float 4s linear forwards; }
        @keyframes float { 0% { transform: translateY(100vh); opacity: 1; } 100% { transform: translateY(-10vh); opacity: 0; } }

        /* UI */
        input { padding: 12px; border: 4px solid #8f6a3c; font-size: 16px; width: 200px; margin-bottom: 10px; }
        button { padding: 12px 25px; background: #7cc576; border: none; color: white; cursor: pointer; font-size: 18px; font-weight: bold; border-bottom: 4px solid #4a8d45; }
        button:active { transform: translateY(2px); border-bottom: 0; }
    </style>
</head>
<body>

    <div id="effects-container"></div>
    <div id="sun" class="sun"></div>

    <div class="garden">
        <h1>Pixel Radio 📻</h1>
        <p>Type: love, sunrise, or rain</p>
        <input type="text" id="mood" placeholder="...">
        <br>
        <button onclick="playMusic()">Bloom 🌸</button>
        <br><br>
        <audio id="player" controls></audio>
    </div>

    <!-- The Meadow -->
    <div class="meadow">
        <!-- Generate 50 blades of grass -->
        <script>
            for(let i=0; i<60; i++) document.write('<div class="grass-blade"></div>');
        </script>
        
        <div class="flower-container" id="flower-bed">
            <div class="flower"></div>
            <div class="flower"></div>
            <div class="flower"></div>
            <div class="flower"></div>
            <div class="flower"></div>
            <div class="flower"></div>
            <div class="flower"></div>
            <div class="flower"></div>
        </div>
    </div>

    <script>
        let heartInterval = null;

        function playMusic() {
            const mood = document.getElementById("mood").value.toLowerCase().trim();
            const player = document.getElementById("player");
            const container = document.getElementById("effects-container");
            const sun = document.getElementById("sun");
            const flowers = document.querySelectorAll(".flower");

            // Reset
            container.innerHTML = "";
            sun.style.bottom = "-180px";
            if (heartInterval) clearInterval(heartInterval);
            document.body.style.background = "linear-gradient(#ffd89b, #f6b46c)";
            flowers.forEach(f => f.classList.remove("bloom"));

            const songs = {
                love: "music/germany.mp3",
                sunrise: "music/summertown.mp3",
                rain: "music/stay.mp3"
            };

            if (songs[mood]) {
                player.src = songs[mood];
                player.play();

                if (mood === "rain") {
                    document.body.style.background = "linear-gradient(#2c3e50, #000000)";
                    setFlowers(["🪻", "🪷", "🪻", "🪷", "🪻", "🪷", "🪻", "🪷"]);
                    for(let i=0; i<100; i++) {
                        let d = document.createElement("div"); d.className = "drop";
                        d.style.left = Math.random() * 100 + "vw"; d.style.animationDelay = Math.random() + "s";
                        container.appendChild(d);
                    }
                } 
                else if (mood === "sunrise") {
                    document.body.style.background = "linear-gradient(#ff7e5f, #feb47b, #ffcc33)";
                    sun.style.bottom = "15%";
                    setFlowers(["🌻", "🌼", "🌻", "🌼", "🌻", "🌼", "🌻", "🌼"]);
                }
                else if (mood === "love") {
                    document.body.style.background = "linear-gradient(#ff9a9e, #fad0c4)";
                    setFlowers(["🌹", "🌷", "🌹", "🌷", "🌹", "🌷", "🌹", "🌷"]);
                    heartInterval = setInterval(() => {
                        let h = document.createElement("div"); h.className = "heart";
                        h.innerHTML = "❤️"; h.style.left = Math.random() * 100 + "vw";
                        container.appendChild(h); setTimeout(() => h.remove(), 4000);
                    }, 400);
                }
            } else {
                alert("Enter: love, sunrise, or rain!");
            }
        }

        function setFlowers(list) {
            const flowers = document.querySelectorAll(".flower");
            flowers.forEach((f, i) => {
                f.innerHTML = list[i];
                setTimeout(() => f.classList.add("bloom"), i * 150);
            });
        }
    </script>
</body>
</html>
